<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cổng thông tin sinh viên</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="page-wrapper">

    <!-- Banner ngang -->
    <div class="top-banner">
        <img th:src="@{/images/banner.png}" alt="banner">
    </div>

    <!-- Form login -->
    <div class="login-container">
        <div class="login-box">
 
            <img th:src="@{/images/Logo-Iuh.png}" alt="logo" style="width:200px; background:#f8fafc;">

            <h2>Đăng nhập hệ thống</h2>
            <p class="subtitle">Vui lòng đăng nhập để tiếp tục vào cổng thông tin sinh viên</p>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
                    </div>
                </div>

                <button type="submit" class="login-btn">Đăng nhập</button>
            </form>

            <div th:if="${param.error}" class="error-message">
                Sai tài khoản hoặc mật khẩu. Vui lòng thử lại.
            </div>

            <div class="footer-note">
                © 2026 Hệ thống quản lý sinh viên - IUH
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    const btn = document.querySelector(".toggle-password");

    if (input.type === "password") {
        input.type = "text";
        btn.textContent = "🙈";
    } else {
        input.type = "password";
        btn.textContent = "👁";
    }
}
</script>

</body>
</html>
